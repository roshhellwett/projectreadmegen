name: CI / Test Suite & Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  lint-and-check:
    name: Code Quality & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install Core Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify Python Syntax across Codebase
        run: |
          python -m compileall src tests

      - name: Verify Package Import & Version Consistency
        run: |
          python -c "import projectreadmegen; print('Version:', projectreadmegen.__version__)"

  frontend-build:
    name: Build Web Studio SPA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Production Frontend Bundle
        working-directory: ./frontend
        run: npm run build

      - name: Upload Frontend Dist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  test-matrix:
    name: Test Suite (Python ${{ matrix.python-version }})
    needs: [frontend-build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Download Packaged Frontend Dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/projectreadmegen/web_dist

      - name: Install Project and Test Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Run Unit Tests (-m unit)
        run: pytest -v -m unit

      - name: Run Smoke Tests (-m smoke)
        run: pytest -v -m smoke

      - name: Run End-to-End Tests (-m e2e)
        run: pytest -v -m e2e

  package-build:
    name: Verify Package Distribution Build
    needs: [test-matrix]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Download Packaged Frontend Dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/projectreadmegen/web_dist

      - name: Install Build and Check Tools
        run: |
          python -m pip install --upgrade pip build twine

      - name: Build Source Distribution & Wheel
        run: python -m build

      - name: Check Package Archives with Twine
        run: twine check dist/*

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 14
